# Decap CMS configuration for Calvary Chapel Aptos
# When this site is deployed to Netlify (or another git-host), set
# `backend.name` to `git-gateway`. For local editing, leave `local_backend: true`
# and run `bun run cms` in another terminal.

backend:
  name: git-gateway
  branch: main

# Enables local CMS development backend.
# Run: bunx decap-server  (or `bun run cms`)
# Then open: http://localhost:5173/admin/
local_backend: true

# Where uploaded images go. Decap will copy them here and they'll be served
# by Vite at /content/uploads/<filename>.
media_folder: "public/content/uploads"
public_folder: "/content/uploads"

# Show editorial workflow (drafts → in review → ready → published).
# Comment out to publish directly.
publish_mode: editorial_workflow

site_url: https://calvarychapelaptos.com
display_url: https://calvarychapelaptos.com
logo_url: /images/img-05.png

collections:
  # Site-wide singletons (one record per file).
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "announcement"
        label: "Announcement Banner"
        file: "public/content/settings/announcement.json"
        description: "A bar at the top of every page. Toggle off to hide. Use for service-time changes, holiday notices, weather closures."
        fields:
          - { label: "Show banner on the site", name: "enabled", widget: "boolean", default: false }
          - { label: "Message", name: "message", widget: "string", hint: "Keep it short — one sentence" }
          - { label: "Link text (optional)", name: "link_text", widget: "string", required: false }
          - { label: "Link URL (optional)", name: "link_url", widget: "string", required: false }

      - name: "general"
        label: "General Info"
        file: "public/content/settings/general.json"
        description: "Address, phone, social URLs. These appear in the footer and on the contact page."
        fields:
          - { label: "Church Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string", hint: "Shows in the footer under the church name" }
          - { label: "Street Address", name: "address_street", widget: "string" }
          - { label: "City / State / Zip", name: "address_city", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Facebook URL", name: "facebook_url", widget: "string" }
          - { label: "Vimeo (full sermon archive)", name: "vimeo_url", widget: "string" }
          - { label: "Saturday Prayer Contact — Name", name: "prayer_contact_name", widget: "string" }
          - { label: "Saturday Prayer Contact — Phone", name: "prayer_contact_phone", widget: "string" }

  - name: "sermons"
    label: "Sermons"
    label_singular: "Sermon"
    folder: "public/content/sermons"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{date}} — {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "e.g. Palm Sunday" }
      - { label: "Scripture Reference", name: "reference", widget: "string", hint: "e.g. Luke 19:28–48" }
      - { label: "Pastor", name: "pastor", widget: "string", default: "Pastor Tom" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Vimeo / Video URL", name: "video_url", widget: "string", required: false, hint: "Paste the full Vimeo link" }
      - { label: "Thumbnail Image", name: "image", widget: "image", required: false, hint: "Drag & drop, or pick from media library" }
      - { label: "Notes / Description", name: "notes", widget: "text", required: false }

  - name: "events"
    label: "Coming Events"
    label_singular: "Event"
    folder: "public/content/events"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{day}} {{time}} — {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Day", name: "day", widget: "string", hint: "e.g. Sunday, Wednesday, 2nd Saturday" }
      - { label: "Time", name: "time", widget: "string", hint: "e.g. 10:00 AM" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Order", name: "order", widget: "number", required: false, default: 0, hint: "Lower numbers appear first" }

  - name: "leaders"
    label: "Leadership"
    label_singular: "Leader"
    folder: "public/content/leaders"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{role}} — {{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "select", options: ["Senior Pastor", "Associate Pastor", "Deacon", "Elder"] }
      - { label: "Photo", name: "image", widget: "image", required: false, hint: "Optional. Drag & drop a portrait" }
      - { label: "Bio", name: "bio", widget: "text", required: false }
      - { label: "Order", name: "order", widget: "number", required: false, default: 0 }

  - name: "series"
    label: "Sermon Series (Books of the Bible)"
    label_singular: "Series"
    folder: "public/content/series"
    create: true
    slug: "{{order}}-{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{book}} — {{subtitle}}"
    description: "Tiles shown on the Sermons page beneath the latest messages. One per book/series the church has taught through."
    fields:
      - { label: "Book / Series Title", name: "book", widget: "string", hint: "e.g. Gospel of John" }
      - { label: "Subtitle", name: "subtitle", widget: "string", hint: "e.g. 21 chapters, or a date range" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Vimeo Link (optional)", name: "vimeo_url", widget: "string", required: false, hint: "Specific showcase for this series. Leave blank to fall back to the main archive." }
      - { label: "Order", name: "order", widget: "number", required: false, default: 99, hint: "Lower numbers show first" }

  - name: "past_events"
    label: "Past Events"
    label_singular: "Past Event"
    folder: "public/content/past_events"
    create: true
    slug: "{{year}}-{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{date}} — {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "string", hint: "e.g. July 20, 2024" }
      - { label: "Year", name: "year", widget: "number", hint: "Used for sort order" }
      - { label: "Place / Time", name: "place", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Photo", name: "image", widget: "image", required: false }
